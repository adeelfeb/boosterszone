<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <filter id="coarse" x="-15%" y="-15%" width="130%" height="130%">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
  </filter>
  <filter id="fine" x="-15%" y="-15%" width="130%" height="130%">
    <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" stitchTiles="stitch"/>
  </filter>
  <rect width="100%" height="100%" fill="#9a7b5c" opacity="0.038"/>
  <rect width="100%" height="100%" filter="url(#coarse)" opacity="0.1"/>
  <rect width="100%" height="100%" filter="url(#fine)" opacity="0.042"/>
</svg>
